<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remedy Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f0;color:#1a1a1a;padding:1rem}
.app{max-width:680px;margin:0 auto;padding:1rem 0}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:1rem;border-bottom:0.5px solid #ddd}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:#d4edda;border-radius:50%;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;stroke:#2e7d50;fill:none;stroke-width:1.8}
.app-title{font-size:17px;font-weight:500;color:#1a1a1a}
.app-sub{font-size:12px;color:#666;margin-top:1px}
.add-btn{background:#2e7d50;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.add-btn:hover{background:#1e5c39}

/* Banners */
.due-banner{background:#fff8e7;border:0.5px solid #f0c040;border-radius:12px;padding:12px 16px;margin-bottom:0.75rem;display:flex;align-items:flex-start;gap:10px}
.due-banner i{color:#b8860b;font-size:18px;margin-top:1px}
.due-title{font-size:13px;font-weight:500;color:#7a5a00;margin-bottom:4px}
.due-list{font-size:12px;color:#7a5a00;line-height:1.9}
.reassess-banner{background:#f0eaff;border:0.5px solid #b39ddb;border-radius:12px;padding:12px 16px;margin-bottom:0.75rem;display:flex;align-items:flex-start;gap:10px}
.reassess-banner i{color:#6a1b9a;font-size:18px;margin-top:1px}
.reassess-title{font-size:13px;font-weight:500;color:#4a148c;margin-bottom:4px}
.reassess-list{font-size:12px;color:#4a148c;line-height:1.9}

/* View toggle */
.view-toggle{display:flex;gap:6px;margin-bottom:1rem}
.view-btn{flex:1;padding:7px;border:0.5px solid #ddd;border-radius:8px;background:#fff;font-size:13px;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.view-btn.active{background:#2e7d50;color:#fff;border-color:#2e7d50}

/* Today calendar view */
.today-date-header{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.today-member-section{margin-bottom:1rem}
.today-member-name{font-size:13px;font-weight:600;color:#2e7d50;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.today-card{background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.today-card.due-now{border-color:#f0c040;background:#fffdf0}
.today-card.taken{border-color:#a5d6a7;background:#f1f8f1;opacity:0.7}
.today-card.missed{border-color:#ef9a9a;background:#fff5f5}
.today-card-info{flex:1}
.today-remedy-name{font-size:13px;font-weight:500;color:#1a1a1a}
.today-condition{font-size:11px;color:#888;margin-top:1px}
.today-time{font-size:11px;color:#b8860b;margin-top:3px}
.today-dose-btns{display:flex;gap:5px}
.today-btn{font-size:11px;padding:4px 9px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap}
.today-btn.tick{background:#e8f5e9;color:#2e7d32}
.today-btn.miss{background:#fdecea;color:#c62828}
.today-btn.undo{background:#f0f0f0;color:#555}
.today-empty{text-align:center;padding:2rem 1rem;color:#888;font-size:13px;background:#fff;border-radius:12px;border:0.5px solid #eee}

/* Member cards */
.member-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;margin-bottom:1rem;overflow:hidden}
.member-card.closed{opacity:0.6}
.member-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;flex-shrink:0}
.member-meta{flex:1}
.member-name{font-size:15px;font-weight:500;color:#1a1a1a}
.member-tags{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-red{background:#fdecea;color:#c62828}
.tag-blue{background:#e3f2fd;color:#1565c0}
.tag-grey{background:#eee;color:#555}
.tag-purple{background:#f0eaff;color:#6a1b9a}
.chevron{font-size:18px;color:#888;transition:transform 0.2s}
.chevron.open{transform:rotate(180deg)}
.member-body{padding:0 16px 16px;border-top:0.5px solid #eee}
.section-label{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin:14px 0 8px}

/* Drag to reorder */
.drag-handle{cursor:grab;color:#ccc;font-size:18px;padding:3px;margin-right:2px}
.drag-handle:active{cursor:grabbing}
.member-card.dragging{opacity:0.4;border:2px dashed #2e7d50}
.member-card.drag-over{border-top:3px solid #2e7d50}

/* Issue cards */
.issue-card{background:#f8f8f6;border-radius:8px;padding:12px 14px;margin-bottom:10px;position:relative}
.issue-card.closed-case{opacity:0.55;border:0.5px dashed #bbb}
.issue-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.issue-condition{font-size:14px;font-weight:500;color:#1a1a1a;flex:1}
.issue-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;color:#888;font-size:16px;padding:3px;border-radius:4px}
.icon-btn:hover{color:#1a1a1a}
.icon-btn.danger:hover{color:#c62828}
.closed-badge{font-size:10px;font-weight:600;background:#eee;color:#888;padding:2px 7px;border-radius:20px;margin-left:6px;vertical-align:middle}

/* Remedies */
.remedies-list{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.remedy-block{background:#fff;border:0.5px solid #e0e0e0;border-radius:8px;padding:10px 12px}
.remedy-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.remedy-name-badge{font-size:13px;font-weight:500;color:#2e7d50}
.remedy-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.remedy-field{font-size:11px;color:#888;line-height:1.5}
.remedy-val{font-size:12px;color:#1a1a1a;font-weight:500}
.next-dose{display:flex;align-items:center;gap:6px;margin-top:7px;padding:5px 9px;border-radius:7px;font-size:12px}
.next-dose.due-now{background:#fdecea;color:#c62828}
.next-dose.due-soon{background:#fff8e7;color:#b8860b}
.next-dose.ok{background:#e8f5e9;color:#2e7d32}
.dose-actions{display:flex;gap:6px;margin-top:7px;align-items:center;flex-wrap:wrap}
.dose-btn{font-size:12px;padding:5px 10px;border-radius:7px;border:none;cursor:pointer;display:flex;align-items:center;gap:4px}
.dose-btn.tick{background:#e8f5e9;color:#2e7d32}
.dose-btn.tick:hover{background:#c8e6c9}
.dose-btn.untick{background:#f5f5f5;color:#666}
.dose-btn.untick:hover{background:#eee}
.dose-btn.missed-btn{background:#fdecea;color:#c62828}
.missed-label{font-size:11px;color:#c62828;display:flex;align-items:center;gap:4px;padding:4px 8px;background:#fdecea;border-radius:7px}
.taken-label{font-size:11px;color:#2e7d32;display:flex;align-items:center;gap:4px;padding:4px 8px;background:#e8f5e9;border-radius:7px}
.remedy-notes{font-size:12px;color:#555;margin-top:6px;padding:6px 8px;background:#f8f8f6;border-radius:6px;line-height:1.5;white-space:pre-wrap}

/* Reassessment date */
.reassess-date-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding:6px 10px;background:#f0eaff;border-radius:7px;font-size:12px;color:#6a1b9a}
.reassess-date-row.overdue{background:#fdecea;color:#c62828}

/* Notes */
.issue-notes-section{margin-top:8px}
.notes-label{font-size:11px;color:#888;margin-bottom:4px}
.notes-text{font-size:12px;color:#1a1a1a;background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:8px 10px;line-height:1.6;white-space:pre-wrap;max-height:120px;overflow-y:auto}

.add-remedy-btn{background:none;border:0.5px dashed #b0d8be;border-radius:7px;padding:6px 10px;font-size:12px;color:#2e7d50;cursor:pointer;display:flex;align-items:center;gap:5px;margin-top:4px;width:100%}
.add-remedy-btn:hover{background:#f0faf4}
.add-issue-btn{background:none;border:0.5px dashed #bbb;border-radius:8px;padding:8px;width:100%;font-size:13px;color:#888;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.add-issue-btn:hover{background:#f0f0ec}

/* Modals */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-backdrop.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:90%;max-width:520px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:16px;color:#1a1a1a}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;font-weight:500;color:#666;margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:14px;color:#1a1a1a;background:#fff}
.form-input:focus{outline:2px solid #2e7d50;outline-offset:1px}
.form-textarea{width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;color:#1a1a1a;background:#fff;resize:vertical;min-height:80px;font-family:inherit;line-height:1.5}
.form-textarea:focus{outline:2px solid #2e7d50;outline-offset:1px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.btn-cancel{background:none;border:0.5px solid #ccc;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:#1a1a1a}
.btn-save{background:#2e7d50;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer}
.btn-save:hover{background:#1e5c39}
.empty-state{text-align:center;padding:2rem;color:#888;font-size:14px}
.notes-edit{width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;resize:vertical;min-height:100px;font-family:inherit;color:#1a1a1a;background:#fff;line-height:1.5}
.tabs{display:flex;margin-bottom:14px;border-bottom:0.5px solid #eee}
.tab{font-size:13px;padding:6px 12px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab.active{color:#2e7d50;border-bottom-color:#2e7d50;font-weight:500}
.divider{height:0.5px;background:#eee;margin:12px 0}
.remedy-modal-block{background:#f8f8f6;border-radius:8px;padding:12px;margin-bottom:10px}
.remedy-modal-block-title{font-size:13px;font-weight:500;color:#2e7d50;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
@media(max-width:480px){.form-row{grid-template-columns:1fr}.remedy-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/><path d="M12 6v6M9 9c0 0 1.5-2 3-2s3 2 3 2"/><path d="M8 14c1 2 2.5 3 4 3s3-1 4-3"/></svg>
      </div>
      <div>
        <div class="app-title">Remedy Tracker</div>
        <div class="app-sub">Homeopathic care for your family</div>
      </div>
    </div>
    <button class="add-btn" onclick="openAddMember()"><i class="ti ti-plus"></i> Add person</button>
  </div>

  <div class="view-toggle">
    <button class="view-btn active" id="btn-today" onclick="switchView('today')"><i class="ti ti-calendar-day"></i> Today</button>
    <button class="view-btn" id="btn-all" onclick="switchView('all')"><i class="ti ti-users"></i> All records</button>
  </div>

  <div id="due-banner" class="due-banner" style="display:none">
    <i class="ti ti-bell"></i>
    <div><div class="due-title">Remedies due</div><div class="due-list" id="due-list"></div></div>
  </div>
  <div id="reassess-banner" class="reassess-banner" style="display:none">
    <i class="ti ti-calendar-event"></i>
    <div><div class="reassess-title">Reassessment due</div><div class="reassess-list" id="reassess-list"></div></div>
  </div>

  <div id="today-view"></div>
  <div id="members-list" style="display:none"></div>
  <div id="empty-state" class="empty-state" style="display:none">
    <i class="ti ti-leaf" style="font-size:32px;display:block;margin-bottom:8px"></i>
    Add a family member to start tracking their remedies
  </div>
</div>

<!-- Member modal -->
<div class="modal-backdrop" id="member-modal">
  <div class="modal">
    <div class="modal-title" id="member-modal-title">Add family member</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="m-name" placeholder="e.g. Sarah" />
    </div>
    <div class="form-group">
      <label class="form-label">Relationship</label>
      <input class="form-input" id="m-rel" placeholder="e.g. Daughter, Husband, Self" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('member-modal')">Cancel</button>
      <button class="btn-save" onclick="saveMember()">Save</button>
    </div>
  </div>
</div>

<!-- Issue modal -->
<div class="modal-backdrop" id="issue-modal">
  <div class="modal">
    <div class="modal-title" id="issue-modal-title">Add health issue</div>
    <div class="form-group">
      <label class="form-label">Family member</label>
      <select class="form-input" id="i-member"><option value="">— select person —</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">Health issue / condition</label>
      <input class="form-input" id="i-condition" placeholder="e.g. Recurring headaches, Anxiety, Eczema" />
    </div>
    <div class="section-label" style="margin-top:4px">Remedies</div>
    <div id="remedy-blocks"></div>
    <button class="add-remedy-btn" onclick="addRemedyBlock()"><i class="ti ti-plus"></i> Add remedy</button>
    <div class="divider"></div>
    <div class="form-group">
      <label class="form-label">Reassessment date</label>
      <input class="form-input" id="i-reassess-date" type="date" />
    </div>
    <div class="form-group">
      <label class="form-label">Progress notes</label>
      <textarea class="form-textarea" id="i-progress" placeholder="Observations, improvements, side effects…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Reassessment notes</label>
      <textarea class="form-textarea" id="i-reassess-notes" placeholder="Practitioner notes, remedy changes, follow-up plan…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('issue-modal')">Cancel</button>
      <button class="btn-save" onclick="saveIssue()">Save</button>
    </div>
  </div>
</div>

<!-- Notes modal -->
<div class="modal-backdrop" id="notes-modal">
  <div class="modal">
    <div class="modal-title" id="notes-modal-title">Notes</div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('progress')">Progress</div>
      <div class="tab" onclick="switchTab('reassess')">Reassessment</div>
    </div>
    <div id="notes-tab-progress">
      <textarea class="notes-edit" id="n-progress" style="min-height:160px" placeholder="Observations, improvements, side effects…"></textarea>
    </div>
    <div id="notes-tab-reassess" style="display:none">
      <textarea class="notes-edit" id="n-reassess" style="min-height:160px" placeholder="Practitioner notes, remedy changes, follow-up plan…"></textarea>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
      <span style="font-size:11px;color:#888">Last updated: <span id="notes-last-updated">—</span></span>
      <div style="display:flex;gap:8px">
        <button class="btn-cancel" onclick="closeModal('notes-modal')">Cancel</button>
        <button class="btn-save" onclick="saveNotes()">Save notes</button>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS=['#d4edda','#d4e4f7','#fde8d8','#f3d4f7','#d4f0f7','#f7ead4'];
const TEXT_COLORS=['#2e7d50','#1565c0','#b35000','#6a1b9a','#00697a','#8a6500'];
let members=JSON.parse(localStorage.getItem('rm_members')||'[]');
let editMemberId=null,editIssueId=null,currentMemberId=null,notesMemberId=null,notesIssueId=null,activeTab='progress';
let remedyBlocks=[];
let currentView='today';
let dragSrcIdx=null;

function uid(){return Math.random().toString(36).slice(2,9)}
function save(){localStorage.setItem('rm_members',JSON.stringify(members))}
function initials(name){return name.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('')}
function freqLabel(h){if(h===720)return'Monthly';if(h===168)return'Weekly';if(h===48)return'Every 2 days';if(h===24)return'Daily';return`Every ${h}h`}

function defaultStart(){
  const d=new Date();d.setHours(8,0,0,0);return d.toISOString().slice(0,16);
}

function nextDoseMs(r){
  if(!r.startTime)return null;
  const iv=(r.freqHours||12)*3600000,start=new Date(r.startTime).getTime(),now=Date.now(),el=now-start;
  if(el<0)return start;
  return start+(Math.floor(el/iv)+1)*iv;
}

function doseStatus(r){
  // check taken
  if(r.takenAt){
    const n=nextDoseMs(r);
    const windowStart=n?(n-(r.freqHours||12)*3600000):0;
    if(new Date(r.takenAt).getTime()>=windowStart) return'taken';
  }
  // check missed
  if(r.missedAt){
    const n=nextDoseMs(r);
    const windowStart=n?(n-(r.freqHours||12)*3600000):0;
    if(new Date(r.missedAt).getTime()>=windowStart) return'missed';
  }
  const n=nextDoseMs(r);if(!n)return null;
  const diff=n-Date.now(),warn=r.freqHours>=720?86400000:3600000;
  return diff<=0?'due-now':diff<warn?'due-soon':'ok';
}

function formatTime(ms){
  const diff=ms-Date.now();if(diff<=0)return'Due now';
  const d=new Date(ms),days=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
  if(days>=1)return`Next: ${d.toLocaleDateString([],{month:'short',day:'numeric'})} at ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  if(h<1)return`Due in ${m}m`;
  return`Due in ${h}h ${m}m — ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
}

function reassessStatus(dateStr){
  if(!dateStr)return null;
  const d=new Date(dateStr);d.setHours(23,59,59,999);
  const diff=d.getTime()-Date.now();
  if(diff<0)return'overdue';
  if(diff<86400000*3)return'soon';
  return'ok';
}

// ---- View switching ----
function switchView(v){
  currentView=v;
  document.getElementById('btn-today').classList.toggle('active',v==='today');
  document.getElementById('btn-all').classList.toggle('active',v==='all');
  document.getElementById('today-view').style.display=v==='today'?'':'none';
  document.getElementById('members-list').style.display=v==='all'?'':'none';
  render();
}

// ---- Banners ----
function renderBanners(){
  const due=[];
  members.forEach(m=>{
    if(m.closed)return;
    (m.issues||[]).forEach(iss=>{
      if(iss.closed)return;
      (iss.remedies||[]).forEach(r=>{
        const s=doseStatus(r);
        if(s==='due-now'||s==='due-soon') due.push(`<strong>${m.name}</strong> — ${r.name||'Remedy'} for ${iss.condition}`);
      });
    });
  });
  const db=document.getElementById('due-banner');
  if(due.length){db.style.display='flex';document.getElementById('due-list').innerHTML=due.map(d=>`• ${d}`).join('<br>');}
  else db.style.display='none';

  const rdue=[];
  members.forEach(m=>{
    if(m.closed)return;
    (m.issues||[]).forEach(iss=>{
      if(iss.closed||!iss.reassessDate)return;
      const s=reassessStatus(iss.reassessDate);
      if(s==='overdue'||s==='soon'){
        const d=new Date(iss.reassessDate).toLocaleDateString([],{day:'numeric',month:'short'});
        rdue.push(`<strong>${m.name}</strong> — ${iss.condition} (${s==='overdue'?'overdue':'due '+d})`);
      }
    });
  });
  const rb=document.getElementById('reassess-banner');
  if(rdue.length){rb.style.display='flex';document.getElementById('reassess-list').innerHTML=rdue.map(d=>`• ${d}`).join('<br>');}
  else rb.style.display='none';
}

// ---- Today view ----
function renderToday(){
  const el=document.getElementById('today-view');
  const today=new Date();
  const dateStr=today.toLocaleDateString([],{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  let html=`<div class="today-date-header"><i class="ti ti-calendar-day" style="color:#2e7d50"></i>${dateStr}</div>`;

  const activeMembers=members.filter(m=>!m.closed);
  if(!activeMembers.length){
    el.innerHTML=html+`<div class="today-empty"><i class="ti ti-leaf" style="font-size:28px;display:block;margin-bottom:8px;color:#ccc"></i>Add a family member to get started</div>`;
    return;
  }

  let anyItems=false;
  activeMembers.forEach((m,mi)=>{
    const ci=mi%COLORS.length;
    const openIssues=(m.issues||[]).filter(i=>!i.closed);
    if(!openIssues.length)return;

    const remedyItems=[];
    openIssues.forEach(iss=>{
      (iss.remedies||[]).forEach(r=>{
        const st=doseStatus(r);
        const nm=nextDoseMs(r);
        remedyItems.push({iss,r,st,nm});
      });
    });
    if(!remedyItems.length)return;
    anyItems=true;

    // sort: due-now first, then due-soon, then ok, then taken/missed
    const order={['due-now']:0,['due-soon']:1,ok:2,taken:3,missed:4};
    remedyItems.sort((a,b)=>(order[a.st]||2)-(order[b.st]||2));

    html+=`<div class="today-member-section">
      <div class="today-member-name">
        <span style="width:26px;height:26px;border-radius:50%;background:${COLORS[ci]};color:${TEXT_COLORS[ci]};display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">${initials(m.name)}</span>
        ${m.name}
      </div>`;

    remedyItems.forEach(({iss,r,st,nm})=>{
      let cardClass='today-card';
      if(st==='due-now'||st==='due-soon') cardClass+=' due-now';
      else if(st==='taken') cardClass+=' taken';
      else if(st==='missed') cardClass+=' missed';

      let timeStr='';
      if(st==='taken') timeStr=`<div class="today-time" style="color:#2e7d32">✓ Taken at ${new Date(r.takenAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>`;
      else if(st==='missed') timeStr=`<div class="today-time" style="color:#c62828">✗ Missed</div>`;
      else if(nm) timeStr=`<div class="today-time">${formatTime(nm)}</div>`;

      let btns='';
      if(st==='taken'||st==='missed'){
        btns=`<button class="today-btn undo" onclick="undoDose('${m.id}','${iss.id}','${r.id}')"><i class="ti ti-rotate-left"></i> Undo</button>`;
      } else {
        btns=`<button class="today-btn tick" onclick="markTaken('${m.id}','${iss.id}','${r.id}')"><i class="ti ti-check"></i> Taken</button>
              <button class="today-btn miss" onclick="markMissed('${m.id}','${iss.id}','${r.id}')"><i class="ti ti-x"></i> Missed</button>`;
      }

      html+=`<div class="${cardClass}">
        <div class="today-card-info">
          <div class="today-remedy-name">${r.name||'Remedy'} <span style="font-weight:400;font-size:11px;color:#888">· ${r.dosage||''}</span></div>
          <div class="today-condition">${iss.condition}</div>
          ${timeStr}
        </div>
        <div class="today-dose-btns">${btns}</div>
      </div>`;
    });

    html+='</div>';
  });

  if(!anyItems){
    html+=`<div class="today-empty"><i class="ti ti-circle-check" style="font-size:28px;display:block;margin-bottom:8px;color:#a5d6a7"></i>No active remedies today.<br>Add a health issue to get started.</div>`;
  }

  el.innerHTML=html;
}

// ---- All records view ----
function renderAll(){
  const el=document.getElementById('members-list');
  const es=document.getElementById('empty-state');
  if(!members.length){es.style.display='block';el.innerHTML='';return;}
  es.style.display='none';

  const active=members.filter(m=>!m.closed),closed=members.filter(m=>m.closed);
  const ordered=[...active,...closed];

  el.innerHTML=ordered.map((m,mi)=>{
    const ci=mi%COLORS.length;
    const openIssues=(m.issues||[]).filter(i=>!i.closed);
    const dueCount=openIssues.reduce((a,i)=>a+(i.remedies||[]).filter(r=>doseStatus(r)==='due-now').length,0);
    const tags=[
      openIssues.length?`<span class="tag tag-blue">${openIssues.length} issue${openIssues.length!==1?'s':''}</span>`:'',
      dueCount?`<span class="tag tag-red">${dueCount} due now</span>`:'',
      m.closed?`<span class="tag tag-grey">Closed</span>`:''
    ].filter(Boolean).join('');

    const issuesHtml=(m.issues||[]).map(iss=>{
      const rdStatus=reassessStatus(iss.reassessDate);
      const rdRow=iss.reassessDate?`<div class="reassess-date-row${rdStatus==='overdue'?' overdue':''}">
        <i class="ti ti-calendar-event"></i>
        Reassess: ${new Date(iss.reassessDate).toLocaleDateString([],{day:'numeric',month:'short',year:'numeric'})}
        ${rdStatus==='overdue'?' — overdue':rdStatus==='soon'?' — coming up':''}
      </div>`:'';

      const remediesHtml=(iss.remedies||[]).map(r=>{
        const st=doseStatus(r),nm=nextDoseMs(r);
        let doseRow='',actionRow='';
        if(st==='taken'){
          doseRow=`<div class="taken-label"><i class="ti ti-circle-check"></i> Taken at ${new Date(r.takenAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>`;
          actionRow=`<div class="dose-actions"><button class="dose-btn untick" onclick="undoDose('${m.id}','${iss.id}','${r.id}')"><i class="ti ti-rotate-left"></i> Undo</button></div>`;
        } else if(st==='missed'){
          doseRow=`<div class="missed-label"><i class="ti ti-alert-circle"></i> Missed dose</div>`;
          actionRow=`<div class="dose-actions"><button class="dose-btn untick" onclick="undoDose('${m.id}','${iss.id}','${r.id}')"><i class="ti ti-rotate-left"></i> Undo</button></div>`;
        } else {
          if(nm) doseRow=`<div class="next-dose ${st||'ok'}"><i class="ti ${st==='due-now'?'ti-alarm':'ti-clock'}"></i>${formatTime(nm)}</div>`;
          if(!iss.closed){
            actionRow=`<div class="dose-actions">
              <button class="dose-btn tick" onclick="markTaken('${m.id}','${iss.id}','${r.id}')"><i class="ti ti-check"></i> Taken</button>
              <button class="dose-btn missed-btn" onclick="markMissed('${m.id}','${iss.id}','${r.id}')"><i class="ti ti-x"></i> Missed</button>
            </div>`;
          }
        }
        return`<div class="remedy-block">
          <div class="remedy-block-header">
            <span class="remedy-name-badge"><i class="ti ti-pill"></i> ${r.name||'Remedy'}</span>
            ${!iss.closed?`<button class="icon-btn danger" onclick="deleteRemedy('${m.id}','${iss.id}','${r.id}')" title="Remove remedy"><i class="ti ti-trash"></i></button>`:''}
          </div>
          <div class="remedy-grid">
            <div class="remedy-field">Dosage<br><span class="remedy-val">${r.dosage||'—'}</span></div>
            <div class="remedy-field">Frequency<br><span class="remedy-val">${freqLabel(r.freqHours)}</span></div>
            <div class="remedy-field">Started<br><span class="remedy-val">${r.startTime?new Date(r.startTime).toLocaleDateString([],{month:'short',day:'numeric'}):'—'}</span></div>
          </div>
          ${r.notes?`<div class="remedy-notes">${r.notes}</div>`:''}
          ${doseRow}${actionRow}
        </div>`;
      }).join('');

      return`<div class="issue-card${iss.closed?' closed-case':''}">
        <div class="issue-top">
          <span class="issue-condition">${iss.condition}${iss.closed?'<span class="closed-badge">Closed</span>':''}</span>
          <div class="issue-actions">
            <button class="icon-btn" onclick="openNotes('${m.id}','${iss.id}')" title="Notes"><i class="ti ti-notes"></i></button>
            <button class="icon-btn" onclick="openEditIssue('${m.id}','${iss.id}')" title="Edit"><i class="ti ti-edit"></i></button>
            ${!iss.closed
              ?`<button class="icon-btn" onclick="closeCase('${m.id}','${iss.id}')" title="Close case"><i class="ti ti-archive"></i></button>`
              :`<button class="icon-btn" onclick="reopenCase('${m.id}','${iss.id}')" title="Reopen"><i class="ti ti-archive-off"></i></button>`}
            <button class="icon-btn danger" onclick="deleteIssue('${m.id}','${iss.id}')" title="Delete issue"><i class="ti ti-trash"></i></button>
          </div>
        </div>
        <div class="remedies-list">${remediesHtml}</div>
        ${rdRow}
        ${iss.progress||iss.reassessNotes?`<div class="issue-notes-section">
          ${iss.progress?`<div class="notes-label" style="margin-top:8px">Progress notes</div><div class="notes-text">${iss.progress}</div>`:''}
          ${iss.reassessNotes?`<div class="notes-label" style="margin-top:6px">Reassessment notes</div><div class="notes-text">${iss.reassessNotes}</div>`:''}
        </div>`:''}
      </div>`;
    }).join('');

    const mIdx=members.indexOf(m);
    return`<div class="member-card${m.closed?' closed':''}" id="card-${m.id}" draggable="true"
        ondragstart="dragStart(event,${mIdx})" ondragover="dragOver(event,${mIdx})" ondrop="dragDrop(event,${mIdx})" ondragleave="dragLeave(event)" ondragend="dragEnd(event)">
      <div class="member-header" onclick="toggleMember('${m.id}')">
        <i class="ti ti-grip-vertical drag-handle" onclick="event.stopPropagation()" title="Drag to reorder"></i>
        <div class="avatar" style="background:${COLORS[ci]};color:${TEXT_COLORS[ci]}">${initials(m.name)}</div>
        <div class="member-meta">
          <div class="member-name">${m.name}${m.relationship?` <span style="font-weight:400;color:#888;font-size:13px">· ${m.relationship}</span>`:''}</div>
          <div class="member-tags">${tags}</div>
        </div>
        <button class="icon-btn danger" onclick="event.stopPropagation();deleteMember('${m.id}')" title="Remove person" style="margin-right:4px"><i class="ti ti-trash"></i></button>
        <i class="ti ti-chevron-down chevron ${m.open?'open':''}"></i>
      </div>
      ${m.open?`<div class="member-body">
        <div class="section-label">Health issues & remedies</div>
        ${issuesHtml}
        ${!m.closed?`<button class="add-issue-btn" onclick="openAddIssue('${m.id}')"><i class="ti ti-plus"></i> Add health issue</button>`:''}
      </div>`:''}
    </div>`;
  }).join('');
}

function render(){
  renderBanners();
  if(currentView==='today') renderToday();
  else renderAll();
}

// ---- Drag to reorder ----
function dragStart(e,idx){dragSrcIdx=idx;e.currentTarget.classList.add('dragging');}
function dragOver(e,idx){e.preventDefault();if(idx!==dragSrcIdx)e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.member-card').forEach(c=>c.classList.remove('drag-over'));}
function dragDrop(e,toIdx){
  e.preventDefault();
  if(dragSrcIdx===null||dragSrcIdx===toIdx)return;
  const moved=members.splice(dragSrcIdx,1)[0];
  members.splice(toIdx,0,moved);
  dragSrcIdx=null;
  save();render();
}

function toggleMember(id){const m=members.find(x=>x.id===id);if(m)m.open=!m.open;save();render();}

// ---- Member ----
function openAddMember(){
  editMemberId=null;
  document.getElementById('m-name').value='';
  document.getElementById('m-rel').value='';
  document.getElementById('member-modal-title').textContent='Add family member';
  document.getElementById('member-modal').classList.add('show');
}
function saveMember(){
  const name=document.getElementById('m-name').value.trim();if(!name)return;
  const rel=document.getElementById('m-rel').value.trim();
  if(editMemberId){const m=members.find(x=>x.id===editMemberId);if(m){m.name=name;m.relationship=rel;}}
  else members.push({id:uid(),name,relationship:rel,issues:[],open:true});
  save();render();closeModal('member-modal');
}
function deleteMember(id){if(!confirm('Remove this person and all their data?'))return;members=members.filter(m=>m.id!==id);save();render();}

// ---- Remedy blocks in modal ----
function buildRemedyBlockHTML(rb,idx){
  const known=[6,8,12,24,48,168,720];
  const isCustom=rb.freqHours&&!known.includes(rb.freqHours);
  return`<div class="remedy-modal-block" id="rb-${rb.id}">
    <div class="remedy-modal-block-title">
      <span>Remedy ${idx+1}</span>
      <button class="icon-btn danger" onclick="removeRemedyBlock('${rb.id}')" title="Remove"><i class="ti ti-trash"></i></button>
    </div>
    <div class="form-group">
      <label class="form-label">Remedy name</label>
      <input class="form-input" id="rb-name-${rb.id}" placeholder="e.g. Belladonna 30C" value="${rb.name||''}" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Dosage</label>
        <input class="form-input" id="rb-dosage-${rb.id}" placeholder="e.g. 3 pellets" value="${rb.dosage||''}" />
      </div>
      <div class="form-group">
        <label class="form-label">Frequency</label>
        <select class="form-input" id="rb-freq-${rb.id}">
          <option value="6" ${rb.freqHours==6?'selected':''}>Every 6 hours</option>
          <option value="8" ${rb.freqHours==8?'selected':''}>Every 8 hours</option>
          <option value="12" ${!rb.freqHours||rb.freqHours==12?'selected':''}>Every 12 hours</option>
          <option value="24" ${rb.freqHours==24?'selected':''}>Once daily</option>
          <option value="48" ${rb.freqHours==48?'selected':''}>Every 2 days</option>
          <option value="168" ${rb.freqHours==168?'selected':''}>Once a week</option>
          <option value="720" ${rb.freqHours==720?'selected':''}>Once a month</option>
          <option value="custom" ${isCustom?'selected':''}>Custom…</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Custom interval (hours)</label>
        <input class="form-input" id="rb-custom-${rb.id}" type="number" min="1" placeholder="e.g. 4" value="${isCustom?rb.freqHours:''}" />
      </div>
      <div class="form-group">
        <label class="form-label">Start date & time</label>
        <input class="form-input" id="rb-start-${rb.id}" type="datetime-local" value="${rb.startTime?rb.startTime.slice(0,16):defaultStart()}" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes for this remedy</label>
      <input class="form-input" id="rb-notes-${rb.id}" placeholder="e.g. take away from food, store cool…" value="${rb.notes||''}" />
    </div>
  </div>`;
}

function refreshRemedyBlocks(){
  document.getElementById('remedy-blocks').innerHTML=remedyBlocks.map((rb,i)=>buildRemedyBlockHTML(rb,i)).join('');
}
function addRemedyBlock(){
  remedyBlocks.push({id:uid(),name:'',dosage:'',freqHours:12,startTime:defaultStart(),notes:''});
  refreshRemedyBlocks();
}
function removeRemedyBlock(id){
  remedyBlocks=remedyBlocks.filter(rb=>rb.id!==id);
  refreshRemedyBlocks();
}
function collectRemedyBlocks(){
  return remedyBlocks.map(rb=>{
    const freqSel=document.getElementById(`rb-freq-${rb.id}`).value;
    const freqHours=freqSel==='custom'?parseFloat(document.getElementById(`rb-custom-${rb.id}`).value)||12:parseFloat(freqSel);
    const startVal=document.getElementById(`rb-start-${rb.id}`).value;
    return{
      id:rb.id,
      name:document.getElementById(`rb-name-${rb.id}`).value.trim(),
      dosage:document.getElementById(`rb-dosage-${rb.id}`).value.trim(),
      freqHours,
      startTime:startVal?new Date(startVal).toISOString():null,
      notes:document.getElementById(`rb-notes-${rb.id}`).value.trim(),
      takenAt:rb.takenAt||null,
      missedAt:rb.missedAt||null
    };
  });
}

// ---- Issue ----
function populateMemberDropdown(selectedId){
  const sel=document.getElementById('i-member');
  sel.innerHTML='<option value="">— select person —</option>';
  members.filter(m=>!m.closed).forEach(m=>{
    sel.innerHTML+=`<option value="${m.id}" ${m.id===selectedId?'selected':''}>${m.name}</option>`;
  });
}
function openAddIssue(memberId){
  editIssueId=null;currentMemberId=memberId;
  document.getElementById('issue-modal-title').textContent='Add health issue';
  populateMemberDropdown(memberId);
  document.getElementById('i-condition').value='';
  document.getElementById('i-reassess-date').value='';
  document.getElementById('i-progress').value='';
  document.getElementById('i-reassess-notes').value='';
  remedyBlocks=[{id:uid(),name:'',dosage:'',freqHours:12,startTime:defaultStart(),notes:''}];
  refreshRemedyBlocks();
  document.getElementById('issue-modal').classList.add('show');
}
function openEditIssue(memberId,issueId){
  const m=members.find(x=>x.id===memberId);
  const iss=(m.issues||[]).find(x=>x.id===issueId);if(!iss)return;
  editIssueId=issueId;currentMemberId=memberId;
  document.getElementById('issue-modal-title').textContent='Edit health issue';
  populateMemberDropdown(memberId);
  document.getElementById('i-condition').value=iss.condition||'';
  document.getElementById('i-reassess-date').value=iss.reassessDate||'';
  document.getElementById('i-progress').value=iss.progress||'';
  document.getElementById('i-reassess-notes').value=iss.reassessNotes||'';
  remedyBlocks=(iss.remedies||[]).map(r=>({...r}));
  refreshRemedyBlocks();
  document.getElementById('issue-modal').classList.add('show');
}
function saveIssue(){
  const condition=document.getElementById('i-condition').value.trim();if(!condition)return;
  const selMemberId=document.getElementById('i-member').value||currentMemberId;
  const m=members.find(x=>x.id===selMemberId);if(!m)return;
  if(!m.issues)m.issues=[];
  const reassessDate=document.getElementById('i-reassess-date').value||null;
  const progress=document.getElementById('i-progress').value.trim();
  const reassessNotes=document.getElementById('i-reassess-notes').value.trim();
  const remedies=collectRemedyBlocks();
  if(editIssueId){
    const iss=m.issues.find(x=>x.id===editIssueId);
    if(iss)Object.assign(iss,{condition,reassessDate,progress,reassessNotes,remedies,notesUpdated:new Date().toISOString()});
  } else {
    m.issues.push({id:uid(),condition,reassessDate,progress,reassessNotes,remedies,closed:false,notesUpdated:null});
  }
  save();render();closeModal('issue-modal');
}
function deleteIssue(memberId,issueId){
  const m=members.find(x=>x.id===memberId);
  if(!m)return;
  if(!confirm('Delete this health issue and all its remedies?'))return;
  m.issues=(m.issues||[]).filter(i=>i.id!==issueId);
  save();render();
}
function closeCase(memberId,issueId){
  const m=members.find(x=>x.id===memberId);
  const iss=(m&&m.issues||[]).find(i=>i.id===issueId);
  if(iss)iss.closed=true;
  save();render();
}
function reopenCase(memberId,issueId){
  const m=members.find(x=>x.id===memberId);
  const iss=(m&&m.issues||[]).find(i=>i.id===issueId);
  if(iss)iss.closed=false;
  save();render();
}
function deleteRemedy(memberId,issueId,remedyId){
  const m=members.find(x=>x.id===memberId);
  const iss=(m&&m.issues||[]).find(i=>i.id===issueId);
  if(iss)iss.remedies=(iss.remedies||[]).filter(r=>r.id!==remedyId);
  save();render();
}

// ---- Dose tracking ----
function markTaken(memberId,issueId,remedyId){
  const m=members.find(x=>x.id===memberId);
  const iss=(m&&m.issues||[]).find(i=>i.id===issueId);
  const r=(iss&&iss.remedies||[]).find(r=>r.id===remedyId);
  if(r){r.takenAt=new Date().toISOString();r.missedAt=null;}
  save();render();
}
function markMissed(memberId,issueId,remedyId){
  const m=members.find(x=>x.id===memberId);
  const iss=(m&&m.issues||[]).find(i=>i.id===issueId);
  const r=(iss&&iss.remedies||[]).find(r=>r.id===remedyId);
  if(r){r.missedAt=new Date().toISOString();r.takenAt=null;}
  save();render();
}
function undoDose(memberId,issueId,remedyId){
  const m=members.find(x=>x.id===memberId);
  const iss=(m&&m.issues||[]).find(i=>i.id===issueId);
  const r=(iss&&iss.remedies||[]).find(r=>r.id===remedyId);
  if(r){r.takenAt=null;r.missedAt=null;}
  save();render();
}

// ---- Notes ----
function openNotes(memberId,issueId){
  notesMemberId=memberId;notesIssueId=issueId;
  const m=members.find(x=>x.id===memberId);
  const iss=(m&&m.issues||[]).find(i=>i.id===issueId);if(!iss)return;
  document.getElementById('notes-modal-title').textContent=`Notes — ${iss.condition}`;
  document.getElementById('n-progress').value=iss.progress||'';
  document.getElementById('n-reassess').value=iss.reassessNotes||'';
  document.getElementById('notes-last-updated').textContent=iss.notesUpdated?new Date(iss.notesUpdated).toLocaleString():'Never';
  switchTab('progress');
  document.getElementById('notes-modal').classList.add('show');
}
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tabs .tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='progress'?0:1)));
  document.getElementById('notes-tab-progress').style.display=tab==='progress'?'':'none';
  document.getElementById('notes-tab-reassess').style.display=tab==='reassess'?'':'none';
}
function saveNotes(){
  const m=members.find(x=>x.id===notesMemberId);
  const iss=(m&&m.issues||[]).find(i=>i.id===notesIssueId);if(!iss)return;
  iss.progress=document.getElementById('n-progress').value.trim();
  iss.reassessNotes=document.getElementById('n-reassess').value.trim();
  iss.notesUpdated=new Date().toISOString();
  save();render();closeModal('notes-modal');
}

function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.modal-backdrop').forEach(b=>b.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');}));

render();
setInterval(render,60000);
</script>
</body>
</html>
