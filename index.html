<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remedy Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f0;color:#1a1a1a;padding:1rem}
.app{max-width:680px;margin:0 auto;padding:1rem 0}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:1rem;border-bottom:0.5px solid #ddd}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:#d4edda;border-radius:50%;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;stroke:#2e7d50;fill:none;stroke-width:1.8}
.app-title{font-size:17px;font-weight:500}
.app-sub{font-size:12px;color:#666;margin-top:1px}
.add-btn{background:#2e7d50;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.add-btn:hover{background:#1e5c39}
.reassess-banner{background:#f0eaff;border:0.5px solid #b39ddb;border-radius:12px;padding:12px 16px;margin-bottom:0.75rem;display:flex;align-items:flex-start;gap:10px}
.reassess-banner i{color:#6a1b9a;font-size:18px;margin-top:1px}
.reassess-title{font-size:13px;font-weight:500;color:#4a148c;margin-bottom:4px}
.reassess-list{font-size:12px;color:#4a148c;line-height:1.9}
.view-toggle{display:flex;gap:6px;margin-bottom:1rem}
.view-btn{flex:1;padding:7px;border:0.5px solid #ddd;border-radius:8px;background:#fff;font-size:13px;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.view-btn.active{background:#2e7d50;color:#fff;border-color:#2e7d50}
/* Day nav */
.day-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px}
.day-nav-btn{background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;color:#555}
.day-nav-btn:hover{background:#f0f0ec}
.day-nav-btn:disabled{opacity:0.35;cursor:default}
.day-nav-label{font-size:14px;font-weight:500;flex:1;text-align:center}
/* Today */
.today-member-section{margin-bottom:1.25rem}
.today-member-name{font-size:13px;font-weight:600;color:#2e7d50;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.today-card{background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px}
.today-card.all-done{border-color:#a5d6a7;background:#f1f8f1}
.today-card.all-missed{border-color:#ef9a9a;background:#fff5f5}
.today-card-info{flex:1;min-width:0}
.today-remedy-name{font-size:13px;font-weight:500}
.today-condition{font-size:11px;color:#888;margin-top:2px}
.counter-pip{width:18px;height:18px;border-radius:50%;border:1.5px solid #ccc;display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:#ccc;flex-shrink:0}
.counter-pip.done{background:#2e7d50;border-color:#2e7d50;color:#fff}
.counter-pip.missed-pip{background:#fdecea;border-color:#ef9a9a;color:#c62828}
.today-dose-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.today-btn{font-size:11px;padding:5px 10px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap;font-weight:500}
.today-btn.tick{background:#e8f5e9;color:#2e7d32}
.today-btn.miss{background:#fdecea;color:#c62828}
.today-btn.undo{background:#f0f0f0;color:#555;font-size:10px}
.today-empty{text-align:center;padding:2rem 1rem;color:#888;font-size:13px;background:#fff;border-radius:12px;border:0.5px solid #eee}
/* Member cards */
.member-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;margin-bottom:1rem;overflow:hidden}
.member-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;flex-shrink:0}
.member-meta{flex:1}
.member-name{font-size:15px;font-weight:500}
.member-tags{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-red{background:#fdecea;color:#c62828}
.tag-blue{background:#e3f2fd;color:#1565c0}
.tag-grey{background:#eee;color:#555}
.chevron{font-size:18px;color:#888;transition:transform 0.2s}
.chevron.open{transform:rotate(180deg)}
.member-body{padding:0 16px 16px;border-top:0.5px solid #eee}
.section-label{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin:14px 0 8px}
/* Issue list — collapsed by default */
.issue-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px;background:#f8f8f6;margin-bottom:6px;cursor:pointer;user-select:none;gap:8px}
.issue-row:hover{background:#f0f0ec}
.issue-row-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.issue-row-name{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.issue-row-tags{display:flex;gap:4px;flex-shrink:0}
.issue-row-actions{display:flex;gap:2px;flex-shrink:0}
.issue-expanded{background:#f8f8f6;border-radius:8px;margin-bottom:6px;overflow:hidden}
.issue-expanded-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;border-bottom:0.5px solid #eee;background:#f0ede8}
.issue-expanded-title{font-size:13px;font-weight:500}
.issue-expanded-body{padding:12px}
/* Archived section */
.archived-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:#888;cursor:pointer;padding:6px 0;margin-top:6px;user-select:none}
.archived-toggle:hover{color:#555}
.archived-section{margin-top:8px;padding:10px 12px;background:#f5f5f5;border-radius:8px;border:0.5px dashed #ccc}
.archived-issue-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid #eee;font-size:13px;color:#888}
.archived-issue-row:last-child{border-bottom:none}
/* Remedy blocks in records */
.remedies-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.remedy-block{background:#fff;border:0.5px solid #e0e0e0;border-radius:8px;padding:10px 12px}
.remedy-block.stopped{opacity:0.45;border-style:dashed}
.remedy-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.remedy-name-badge{font-size:13px;font-weight:500;color:#2e7d50}
.remedy-name-badge.stopped{color:#999}
.stopped-badge{font-size:10px;background:#eee;color:#888;padding:2px 6px;border-radius:10px;margin-left:6px;font-weight:600}
.remedy-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.remedy-field{font-size:11px;color:#888;line-height:1.5}
.remedy-val{font-size:12px;color:#1a1a1a;font-weight:500}
.remedy-notes{font-size:12px;color:#555;margin-top:6px;padding:6px 8px;background:#f8f8f6;border-radius:6px;line-height:1.5;white-space:pre-wrap}
.taken-label{font-size:11px;color:#2e7d32;display:flex;align-items:center;gap:4px;padding:4px 8px;background:#e8f5e9;border-radius:7px}
.missed-label{font-size:11px;color:#c62828;display:flex;align-items:center;gap:4px;padding:4px 8px;background:#fdecea;border-radius:7px}
.reassess-date-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding:6px 10px;background:#f0eaff;border-radius:7px;font-size:12px;color:#6a1b9a}
.reassess-date-row.overdue{background:#fdecea;color:#c62828}
.notes-text{font-size:12px;background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:8px 10px;line-height:1.6;white-space:pre-wrap;max-height:120px;overflow-y:auto}
.add-remedy-btn{background:none;border:0.5px dashed #b0d8be;border-radius:7px;padding:6px 10px;font-size:12px;color:#2e7d50;cursor:pointer;display:flex;align-items:center;gap:5px;margin-top:4px;width:100%}
.add-remedy-btn:hover{background:#f0faf4}
.add-issue-btn{background:none;border:0.5px dashed #bbb;border-radius:8px;padding:8px;width:100%;font-size:13px;color:#888;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
.add-issue-btn:hover{background:#f0f0ec}
/* Reports */
.report-member-select{margin-bottom:0.75rem}
.report-issue-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;margin-bottom:1rem;overflow:hidden}
.report-issue-header{padding:12px 16px;background:#f8f8f6;border-bottom:0.5px solid #eee}
.report-issue-title{font-size:14px;font-weight:600}
.report-issue-meta{font-size:12px;color:#888;margin-top:3px}
.report-remedy-section{padding:12px 16px;border-bottom:0.5px solid #f0f0f0}
.report-remedy-title{font-size:13px;font-weight:500;color:#2e7d50;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.report-stats{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.report-stat{background:#f5f5f5;border-radius:8px;padding:6px 12px;text-align:center}
.report-stat-num{font-size:18px;font-weight:600}
.report-stat-label{font-size:10px;color:#888;margin-top:1px}
.report-stat.green .report-stat-num{color:#2e7d32}
.report-stat.red .report-stat-num{color:#c62828}
.dose-log-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto}
.dose-log-item{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0;border-bottom:0.5px solid #f5f5f5}
.dose-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.dose-dot.taken{background:#2e7d32}
.dose-dot.missed{background:#c62828}
.report-notes-section{padding:12px 16px}
.report-note-entry{margin-bottom:12px;padding-bottom:12px;border-bottom:0.5px solid #f0f0f0}
.report-note-entry:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.report-note-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px}
.report-note-text{font-size:13px;line-height:1.6;white-space:pre-wrap;color:#1a1a1a}
.report-empty{font-size:12px;color:#aaa;font-style:italic;padding:8px 0}
/* Modals */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-backdrop.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:90%;max-width:520px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;font-weight:500;color:#666;margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:14px;color:#1a1a1a;background:#fff}
.form-input:focus{outline:2px solid #2e7d50;outline-offset:1px}
.form-textarea{width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;color:#1a1a1a;background:#fff;resize:vertical;min-height:80px;font-family:inherit;line-height:1.5}
.form-textarea:focus{outline:2px solid #2e7d50;outline-offset:1px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.btn-cancel{background:none;border:0.5px solid #ccc;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer}
.btn-save{background:#2e7d50;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer}
.btn-save:hover{background:#1e5c39}
.empty-state{text-align:center;padding:2rem;color:#888;font-size:14px}
.notes-edit{width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;resize:vertical;min-height:120px;font-family:inherit;line-height:1.5}
.tabs{display:flex;margin-bottom:14px;border-bottom:0.5px solid #eee}
.tab{font-size:13px;padding:6px 12px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab.active{color:#2e7d50;border-bottom-color:#2e7d50;font-weight:500}
.divider{height:0.5px;background:#eee;margin:12px 0}
.remedy-modal-block{background:#f8f8f6;border-radius:8px;padding:12px;margin-bottom:10px}
.remedy-modal-block-title{font-size:13px;font-weight:500;color:#2e7d50;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.day-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.day-chip{padding:5px 10px;border-radius:20px;border:1.5px solid #ccc;font-size:12px;cursor:pointer;user-select:none;background:#fff;color:#555}
.day-chip.selected{background:#2e7d50;border-color:#2e7d50;color:#fff;font-weight:500}
.icon-btn{background:none;border:none;cursor:pointer;color:#888;font-size:16px;padding:3px;border-radius:4px}
.icon-btn:hover{color:#1a1a1a}
.icon-btn.danger:hover{color:#c62828}
@media(max-width:480px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/><path d="M12 6v6M9 9c0 0 1.5-2 3-2s3 2 3 2"/><path d="M8 14c1 2 2.5 3 4 3s3-1 4-3"/></svg>
      </div>
      <div><div class="app-title">Remedy Tracker</div><div class="app-sub">Homeopathic care for your family</div></div>
    </div>
    <button class="add-btn" onclick="openAddMember()"><i class="ti ti-plus"></i> Add person</button>
  </div>

  <div class="view-toggle">
    <button class="view-btn active" id="btn-today" onclick="switchView('today')"><i class="ti ti-calendar-day"></i> Today</button>
    <button class="view-btn" id="btn-all" onclick="switchView('all')"><i class="ti ti-users"></i> All records</button>
    <button class="view-btn" id="btn-report" onclick="switchView('report')"><i class="ti ti-chart-line"></i> Reports</button>
  </div>

  <div id="reassess-banner" class="reassess-banner" style="display:none">
    <i class="ti ti-calendar-event"></i>
    <div><div class="reassess-title">Reassessment due today</div><div class="reassess-list" id="reassess-list"></div></div>
  </div>

  <div id="today-view"></div>
  <div id="members-list" style="display:none"></div>
  <div id="report-view" style="display:none"></div>
  <div id="empty-state" class="empty-state" style="display:none">
    <i class="ti ti-leaf" style="font-size:32px;display:block;margin-bottom:8px"></i>Add a family member to start tracking
  </div>
</div>

<!-- Member modal -->
<div class="modal-backdrop" id="member-modal">
  <div class="modal">
    <div class="modal-title" id="member-modal-title">Add family member</div>
    <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="m-name" placeholder="e.g. Sarah"/></div>
    <div class="form-group"><label class="form-label">Relationship</label><input class="form-input" id="m-rel" placeholder="e.g. Daughter, Husband, Self"/></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('member-modal')">Cancel</button>
      <button class="btn-save" onclick="saveMember()">Save</button>
    </div>
  </div>
</div>

<!-- Issue modal -->
<div class="modal-backdrop" id="issue-modal">
  <div class="modal">
    <div class="modal-title" id="issue-modal-title">Add health issue</div>
    <div class="form-group"><label class="form-label">Family member</label><select class="form-input" id="i-member"><option value="">— select person —</option></select></div>
    <div class="form-group"><label class="form-label">Health issue / condition</label><input class="form-input" id="i-condition" placeholder="e.g. Recurring headaches"/></div>
    <div class="section-label" style="margin-top:4px">Remedies</div>
    <div id="remedy-blocks"></div>
    <button class="add-remedy-btn" onclick="addRemedyBlock()"><i class="ti ti-plus"></i> Add remedy</button>
    <div class="divider"></div>
    <div class="form-group"><label class="form-label">Reassessment date</label><input class="form-input" id="i-reassess-date" type="date"/></div>
    <div class="form-group"><label class="form-label">Progress notes</label><textarea class="form-textarea" id="i-progress" placeholder="Observations, improvements, side effects…"></textarea></div>
    <div class="form-group"><label class="form-label">Reassessment notes</label><textarea class="form-textarea" id="i-reassess-notes" placeholder="Practitioner notes, remedy changes, follow-up plan…"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('issue-modal')">Cancel</button>
      <button class="btn-save" onclick="saveIssue()">Save</button>
    </div>
  </div>
</div>

<!-- Notes modal -->
<div class="modal-backdrop" id="notes-modal">
  <div class="modal">
    <div class="modal-title" id="notes-modal-title">Notes</div>
    <div class="tabs">
      <div class="tab active" onclick="switchNotesTab('progress')">Progress</div>
      <div class="tab" onclick="switchNotesTab('reassess')">Reassessment</div>
    </div>
    <div id="notes-tab-progress"><textarea class="notes-edit" id="n-progress" style="min-height:160px" placeholder="Observations, improvements, side effects…"></textarea></div>
    <div id="notes-tab-reassess" style="display:none"><textarea class="notes-edit" id="n-reassess" style="min-height:160px" placeholder="Practitioner notes, remedy changes, follow-up plan…"></textarea></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
      <span style="font-size:11px;color:#888">Last updated: <span id="notes-last-updated">—</span></span>
      <div style="display:flex;gap:8px">
        <button class="btn-cancel" onclick="closeModal('notes-modal')">Cancel</button>
        <button class="btn-save" onclick="saveNotes()">Save notes</button>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS=['#d4edda','#d4e4f7','#fde8d8','#f3d4f7','#d4f0f7','#f7ead4'];
const TEXT_COLORS=['#2e7d50','#1565c0','#b35000','#6a1b9a','#00697a','#8a6500'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let members=JSON.parse(localStorage.getItem('rm_members')||'[]');
let editMemberId=null,editIssueId=null,currentMemberId=null,notesMemberId=null,notesIssueId=null;
let remedyBlocks=[];
let currentView='today';
let reportMemberId=null,reportIssueId=null;
// Track which issues are expanded per member
let expandedIssues={};
// Track which archived sections are open
let archivedOpen={};
// Current date offset for Today view (0=today, -1=yesterday, etc.)
let dayOffset=0;

function uid(){return Math.random().toString(36).slice(2,9)}
function save(){localStorage.setItem('rm_members',JSON.stringify(members))}
function initials(name){return name.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('')}

// ---- Date helpers ----
function localDateStr(date){
  const d=date||new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function viewDateStr(){
  const d=new Date();d.setDate(d.getDate()+dayOffset);return localDateStr(d);
}
function todayKey(){return localDateStr();}
function defaultStartStr(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T08:00`;
}
function localDTStr(isoStr){
  const d=new Date(isoStr);
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ---- Frequency ----
function freqLabel(r){
  if(r.freqType==='days-of-week'){const days=(r.daysOfWeek||[]).map(d=>DAYS[d]).join(', ');return days||'No days set';}
  const h=r.freqHours||24;
  if(h===2)return'Every 2 hours';
  if(h===6)return'Every 6 hours';
  if(h===8)return'3x daily';
  if(h===12)return'2x daily';
  if(h===24)return'Once daily';
  if(h===48)return'Every 2 days';
  if(h===168)return'Weekly';
  if(h===720)return'Monthly';
  if(h<24)return`Every ${h}h`;
  return`Every ${Math.round(h/24)}d`;
}

function isDueOnDate(r,dateStr){
  if(r.stopped)return false;
  if(!r.startTime)return false;
  const startStr=localDateStr(new Date(r.startTime));
  if(dateStr<startStr)return false;
  if(r.freqType==='days-of-week'){
    const dow=new Date(dateStr+'T12:00:00').getDay();
    return(r.daysOfWeek||[]).includes(dow);
  }
  const h=r.freqHours||24;
  if(h<24)return true;
  const start=new Date(startStr+'T00:00:00');
  const target=new Date(dateStr+'T00:00:00');
  const daysDiff=Math.round((target-start)/86400000);
  const intervalDays=Math.round(h/24);
  return daysDiff>=0&&daysDiff%intervalDays===0;
}

function getDosesNeeded(r,dateStr){
  if(!isDueOnDate(r,dateStr))return 0;
  if(r.freqType==='days-of-week')return 1;
  const h=r.freqHours||24;
  if(h>=24)return 1;
  return Math.round(24/h);
}

function getDateRec(r,dateStr){
  if(!r.dailyLog)r.dailyLog={};
  if(!r.dailyLog[dateStr])r.dailyLog[dateStr]={taken:0,missed:0};
  return r.dailyLog[dateStr];
}

function dateStatus(r,dateStr){
  const needed=getDosesNeeded(r,dateStr);
  if(needed===0)return'not-today';
  const rec=getDateRec(r,dateStr);
  if(rec.taken>=needed)return'all-done';
  if(rec.taken+rec.missed>=needed)return'all-missed';
  return'pending';
}

  let anyItems=false;

    const ci=mi%COLORS.length;

    (m.issues||[]).filter(i=>!i.closed).forEach(iss=>{
      (iss.remedies||[]).filter(r=>!r.stopped).forEach(r=>{

        if(st==='not-today')return;

      });

    anyItems=true;

    const order={pending:0,'all-done':1,'all-missed':2};
    items.sort((a,b)=>(order[a.st]||0)-(order[b.st]||0));

    html+=`<div class="today-member-section">
      <div class="today-member-name">
        <span style="width:26px;height:26px;border-radius:50%;background:${COLORS[ci]};color:${TEXT_COLORS[ci]};display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0">${initials(m.name)}</span>
        ${m.name}
      </div>`;

    items.forEach(({iss,r,st})=>{
      const needed=getDosesNeeded(r,dateKey);
      const rec=getDateRec(r,dateKey);
      const taken=rec.taken||0,missed=rec.missed||0;
      let cardClass='today-card';
      if(st==='all-done')cardClass+=' all-done';
      else if(st==='all-missed')cardClass+=' all-missed';

      let pipsHtml='';

        for(let i=0;i<needed;i++){
          if(i<taken)pipsHtml+=`<span class="counter-pip done"><i class="ti ti-check" style="font-size:8px"></i></span>`;
          else if(i<taken+missed)pipsHtml+=`<span class="counter-pip missed-pip">✕</span>`;
          else pipsHtml+=`<span class="counter-pip"></span>`;
        }
      }

      let statusText='';
      if(st==='all-done')statusText=`<span style="color:#2e7d32;font-size:11px">✓ All done</span>`;
      else if(st==='all-missed')statusText=`<span style="color:#c62828;font-size:11px">✕ Missed</span>`;

function changeDay(delta){
  const newOffset=dayOffset+delta;
  if(newOffset>0||newOffset<-7)return;
  dayOffset=newOffset;
  render();
}

// Dose actions — all take explicit dateKey so they work on past days too
function dateTaken(mid,iid,rid,dateKey){
  const r=getR(mid,iid,rid);if(!r)return;
  const needed=getDosesNeeded(r,dateKey),rec=getDateRec(r,dateKey);
  if(rec.taken+rec.missed<needed){rec.taken++;logDose(r,'taken',dateKey);}
  save();render();
}
function dateMissed(mid,iid,rid,dateKey){
  const r=getR(mid,iid,rid);if(!r)return;
  const needed=getDosesNeeded(r,dateKey),rec=getDateRec(r,dateKey);
  if(rec.taken+rec.missed<needed){rec.missed++;logDose(r,'missed',dateKey);}
  save();render();
}
function dateUndo(mid,iid,rid,dateKey){
  const r=getR(mid,iid,rid);if(!r||!r.dailyLog||!r.dailyLog[dateKey])return;
  const rec=r.dailyLog[dateKey];
  if(rec.missed>0)rec.missed--;else if(rec.taken>0)rec.taken--;
  // remove last log entry for this date
  if(r.doseLog&&r.doseLog.length){
    for(let i=r.doseLog.length-1;i>=0;i--){
      if(r.doseLog[i].date===dateKey){r.doseLog.splice(i,1);break;}
    }
  }
  save();render();
}
function logDose(r,type,dateKey){
  if(!r.doseLog)r.doseLog=[];
  r.doseLog.push({date:dateKey||todayKey(),type,ts:new Date().toISOString()});
}
function getR(mid,iid,rid){
  const m=members.find(x=>x.id===mid);
  const iss=(m&&m.issues||[]).find(i=>i.id===iid);
  return(iss&&iss.remedies||[]).find(r=>r.id===rid)||null;
}

// ---- Stop/restart remedy ----
function stopRemedy(mid,iid,rid){
  const r=getR(mid,iid,rid);if(!r)return;
  r.stopped=true;r.stoppedDate=localDateStr();save();render();
}
function restartRemedy(mid,iid,rid){
  const r=getR(mid,iid,rid);if(!r)return;
  r.stopped=false;delete r.stoppedDate;save();render();
}

function reassessStatusFull(dateStr){
  if(!dateStr)return null;
  const today=todayKey();
  if(dateStr<today)return'overdue';
  const diff=new Date(dateStr+'T12:00:00')-Date.now();
  if(diff<86400000*3)return'soon';
  return'ok';
}

// ---- Reports ----
function renderReport(){

  const iss=issues.find(x=>x.id===reportIssueId);

  html+=`<div class="report-issue-card">
    <div class="report-issue-header">

    </div>`;

  // Per remedy stats — use dailyLog as source of truth for counts
  (iss.remedies||[]).forEach(r=>{
    // Count from dailyLog (accurate)
    let totalTaken=0,totalMissed=0;
    if(r.dailyLog){
      Object.values(r.dailyLog).forEach(rec=>{
        totalTaken+=(rec.taken||0);
        totalMissed+=(rec.missed||0);
      });
    }
    // fallback to doseLog if dailyLog empty
    if(totalTaken===0&&totalMissed===0&&r.doseLog&&r.doseLog.length){
      r.doseLog.forEach(e=>{if(e.type==='taken')totalTaken++;else totalMissed++;});
    }
    const total=totalTaken+totalMissed;
    const pct=total>0?Math.round(totalTaken/total*100):null;
    const daysOn=r.startTime?Math.max(0,Math.round((Date.now()-new Date(r.startTime).getTime())/86400000)):null;

    // Build dose history from dailyLog
    const byDate={};
    if(r.dailyLog){Object.entries(r.dailyLog).forEach(([dk,rec])=>{if(rec.taken||rec.missed)byDate[dk]=rec;});}
    const sortedDates=Object.keys(byDate).sort().reverse().slice(0,60);
    const doseLogHtml=sortedDates.length?sortedDates.map(dk=>{
      const rec=byDate[dk];
      const dateStr=new Date(dk+'T12:00:00').toLocaleDateString([],{weekday:'short',day:'numeric',month:'short'});
      const parts=[];
      if(rec.taken>0)parts.push(`<span class="dose-dot taken"></span> ${rec.taken} taken`);
      if(rec.missed>0)parts.push(`<span class="dose-dot missed"></span> ${rec.missed} missed`);
      return`<div class="dose-log-item"><span style="min-width:100px;color:#555">${dateStr}</span>${parts.join('&nbsp;&nbsp;')}</div>`;
    }).join(''):`<div class="report-empty">No doses recorded yet — use Today view to log doses.</div>`;

    html+=`<div class="report-remedy-section">
      <div class="report-remedy-title"><i class="ti ti-pill"></i>${r.name||'Remedy'}${r.stopped?' <span style="font-size:10px;color:#999;background:#eee;padding:1px 6px;border-radius:8px">stopped</span>':''}
        <span style="font-weight:400;font-size:11px;color:#888">· ${r.dosage||''} · ${freqLabel(r)}</span>
      </div>
      <div class="report-stats">
        <div class="report-stat green"><div class="report-stat-num">${totalTaken}</div><div class="report-stat-label">Taken</div></div>
        <div class="report-stat red"><div class="report-stat-num">${totalMissed}</div><div class="report-stat-label">Missed</div></div>
        ${pct!==null?`<div class="report-stat"><div class="report-stat-num">${pct}%</div><div class="report-stat-label">Adherence</div></div>`:''}
        ${daysOn!==null?`<div class="report-stat"><div class="report-stat-num">${daysOn}</div><div class="report-stat-label">Days on</div></div>`:''}
      </div>
      <div style="font-size:11px;color:#888;margin-bottom:6px">Dose history (most recent first)</div>
      <div class="dose-log-list">${doseLogHtml}</div>
    </div>`;
  });

  // Notes section
  html+=`<div class="report-notes-section">
    <div style="font-size:12px;font-weight:600;color:#555;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.04em;font-size:11px">Notes & observations</div>`;
  if(iss.progress){
    html+=`<div class="report-note-entry">
      <div class="report-note-label">Progress notes${iss.notesUpdated?' <span style="font-weight:400;text-transform:none;letter-spacing:0">· Updated '+new Date(iss.notesUpdated).toLocaleDateString([],{day:'numeric',month:'short',year:'numeric'})+'</span>':''}</div>
      <div class="report-note-text">${iss.progress}</div>
    </div>`;
  }
  if(iss.reassessNotes){
    html+=`<div class="report-note-entry">
      <div class="report-note-label">Reassessment notes</div>
      <div class="report-note-text">${iss.reassessNotes}</div>
    </div>`;
  }
  if(!iss.progress&&!iss.reassessNotes)html+=`<div class="report-empty">No notes yet. Tap the notes icon on a health issue in All Records to add observations.</div>`;
  html+=`</div></div>`;
  el.innerHTML=html;
}

function selectReportMember(id){reportMemberId=id;reportIssueId=null;renderReport();}
function selectReportIssue(id){reportIssueId=id;renderReport();}

// ---- Render ----
function render(){
  renderBanners();
  if(currentView==='today')renderToday();
  else if(currentView==='all')renderAll();
  else renderReport();
}

function toggleMember(id){const m=members.find(x=>x.id===id);if(m)m.open=!m.open;save();render();}

// ---- Member ----
function openAddMember(){
  editMemberId=null;
  document.getElementById('m-name').value='';document.getElementById('m-rel').value='';
  document.getElementById('member-modal-title').textContent='Add family member';
  document.getElementById('member-modal').classList.add('show');
}
function saveMember(){
  const name=document.getElementById('m-name').value.trim();if(!name)return;
  const rel=document.getElementById('m-rel').value.trim();
  if(editMemberId){const m=members.find(x=>x.id===editMemberId);if(m){m.name=name;m.relationship=rel;}}
  else members.push({id:uid(),name,relationship:rel,issues:[],open:true});
  save();render();closeModal('member-modal');
}
function deleteMember(id){if(!confirm('Remove this person and all their data?'))return;members=members.filter(m=>m.id!==id);save();render();}

// ---- Remedy blocks in modal ----
const blockDays={};

function buildRemedyBlockHTML(rb,idx){
  const known=[2,6,8,12,24,48,168,720];
  const isDow=rb.freqType==='days-of-week';
  const isCustom=!isDow&&rb.freqHours&&!known.includes(rb.freqHours);
  const selVal=isDow?'days-of-week':String(rb.freqHours||24);
  if(!blockDays[rb.id])blockDays[rb.id]=rb.daysOfWeek||[];
  const dayChips=DAYS.map((d,i)=>`<span class="day-chip${(blockDays[rb.id]||[]).includes(i)?' selected':''}" onclick="toggleDay('${rb.id}',${i})">${d}</span>`).join('');
  return`<div class="remedy-modal-block" id="rb-${rb.id}">
    <div class="remedy-modal-block-title"><span>Remedy ${idx+1}</span>
      <button class="icon-btn danger" onclick="removeRemedyBlock('${rb.id}')"><i class="ti ti-trash"></i></button></div>
    <div class="form-group"><label class="form-label">Remedy name</label>
      <input class="form-input" id="rb-name-${rb.id}" placeholder="e.g. Belladonna 30C" value="${rb.name||''}"/></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Dosage</label>
        <input class="form-input" id="rb-dosage-${rb.id}" placeholder="e.g. 3 pellets" value="${rb.dosage||''}"/></div>
      <div class="form-group"><label class="form-label">Frequency</label>
        <select class="form-input" id="rb-freq-${rb.id}" onchange="onFreqChange('${rb.id}')">
          <option value="2" ${selVal==='2'?'selected':''}>Every 2 hours</option>
          <option value="6" ${selVal==='6'?'selected':''}>Every 6 hours</option>
          <option value="8" ${selVal==='8'?'selected':''}>3x daily</option>
          <option value="12" ${selVal==='12'?'selected':''}>2x daily</option>
          <option value="24" ${!rb.freqHours&&!isDow||selVal==='24'?'selected':''}>Once daily</option>
          <option value="48" ${selVal==='48'?'selected':''}>Every 2 days</option>
          <option value="168" ${selVal==='168'?'selected':''}>Weekly</option>
          <option value="720" ${selVal==='720'?'selected':''}>Monthly</option>
          <option value="days-of-week" ${isDow?'selected':''}>Specific days of week…</option>
          <option value="custom" ${isCustom?'selected':''}>Custom interval…</option>
        </select></div>
    </div>
    <div id="rb-dow-${rb.id}" style="display:${isDow?'block':'none'};margin-bottom:12px">
      <label class="form-label">Select days</label>
      <div class="day-picker">${dayChips}</div>
    </div>
    <div id="rb-custom-wrap-${rb.id}" style="display:${isCustom?'block':'none'};margin-bottom:12px">
      <label class="form-label">Custom interval (hours)</label>
      <input class="form-input" id="rb-custom-${rb.id}" type="number" min="0.5" step="0.5" placeholder="e.g. 2" value="${isCustom?rb.freqHours:''}"/>
    </div>
    <div class="form-group"><label class="form-label">Start date & time</label>
      <input class="form-input" id="rb-start-${rb.id}" type="datetime-local" value="${rb.startTime?localDTStr(rb.startTime):defaultStartStr()}"/></div>
    <div class="form-group"><label class="form-label">Notes for this remedy</label>
      <textarea class="form-textarea" id="rb-notes-${rb.id}" placeholder="e.g. take away from food, store cool, observe for aggravation…">${rb.notes||''}</textarea></div>
  </div>`;
}

function onFreqChange(rbId){
  const v=document.getElementById(`rb-freq-${rbId}`).value;
  document.getElementById(`rb-dow-${rbId}`).style.display=v==='days-of-week'?'block':'none';
  document.getElementById(`rb-custom-wrap-${rbId}`).style.display=v==='custom'?'block':'none';
}
function toggleDay(rbId,dayIdx){
  if(!blockDays[rbId])blockDays[rbId]=[];
  const arr=blockDays[rbId],i=arr.indexOf(dayIdx);
  if(i>=0)arr.splice(i,1);else arr.push(dayIdx);
  const c=document.querySelector(`#rb-dow-${rbId} .day-picker`);
  if(c)c.innerHTML=DAYS.map((d,i)=>`<span class="day-chip${arr.includes(i)?' selected':''}" onclick="toggleDay('${rbId}',${i})">${d}</span>`).join('');
}
function refreshRemedyBlocks(){document.getElementById('remedy-blocks').innerHTML=remedyBlocks.map((rb,i)=>buildRemedyBlockHTML(rb,i)).join('');}
function addRemedyBlock(){const rb={id:uid(),name:'',dosage:'',freqHours:24,freqType:'interval',daysOfWeek:[],startTime:null,notes:'',dailyLog:{},doseLog:[]};remedyBlocks.push(rb);blockDays[rb.id]=[];refreshRemedyBlocks();}
function removeRemedyBlock(id){remedyBlocks=remedyBlocks.filter(rb=>rb.id!==id);delete blockDays[id];refreshRemedyBlocks();}
function collectRemedyBlocks(){
  return remedyBlocks.map(rb=>{
    const freqSel=document.getElementById(`rb-freq-${rb.id}`).value;
    const startVal=document.getElementById(`rb-start-${rb.id}`).value;
    const existing=members.flatMap(m=>m.issues||[]).flatMap(i=>i.remedies||[]).find(r=>r.id===rb.id);
    let freqType='interval',freqHours=24,daysOfWeek=[];
    if(freqSel==='days-of-week'){freqType='days-of-week';daysOfWeek=[...(blockDays[rb.id]||[])].sort((a,b)=>a-b);freqHours=0;}
    else if(freqSel==='custom'){freqHours=parseFloat(document.getElementById(`rb-custom-${rb.id}`).value)||24;}
    else freqHours=parseFloat(freqSel)||24;
    let startTime=null;
    if(startVal){const[datePart,timePart]=startVal.split('T');const[y,mo,d]=datePart.split('-').map(Number);const[h,min]=(timePart||'08:00').split(':').map(Number);startTime=new Date(y,mo-1,d,h,min).toISOString();}
    return{id:rb.id,name:document.getElementById(`rb-name-${rb.id}`).value.trim(),dosage:document.getElementById(`rb-dosage-${rb.id}`).value.trim(),
      freqType,freqHours,daysOfWeek,startTime,notes:document.getElementById(`rb-notes-${rb.id}`).value.trim(),
      stopped:existing?existing.stopped||false:false,stoppedDate:existing?existing.stoppedDate||null:null,
      dailyLog:existing?existing.dailyLog||{}:{},doseLog:existing?existing.doseLog||[]:[]};
  });
}

// ---- Issue ----
function populateMemberDropdown(selectedId){
  const sel=document.getElementById('i-member');
  sel.innerHTML='<option value="">— select person —</option>';
  members.filter(m=>!m.closed).forEach(m=>sel.innerHTML+=`<option value="${m.id}" ${m.id===selectedId?'selected':''}>${m.name}</option>`);
}
function openAddIssue(memberId){
  editIssueId=null;currentMemberId=memberId;
  document.getElementById('issue-modal-title').textContent='Add health issue';
  populateMemberDropdown(memberId);
  ['i-condition','i-reassess-date','i-progress','i-reassess-notes'].forEach(id=>document.getElementById(id).value='');
  remedyBlocks=[];
  const rb={id:uid(),name:'',dosage:'',freqHours:24,freqType:'interval',daysOfWeek:[],startTime:null,notes:'',dailyLog:{},doseLog:[]};
  remedyBlocks.push(rb);blockDays[rb.id]=[];refreshRemedyBlocks();
  document.getElementById('issue-modal').classList.add('show');
}
function openEditIssue(memberId,issueId){
  const m=members.find(x=>x.id===memberId);
  const iss=(m.issues||[]).find(x=>x.id===issueId);if(!iss)return;
  editIssueId=issueId;currentMemberId=memberId;
  document.getElementById('issue-modal-title').textContent='Edit health issue';
  populateMemberDropdown(memberId);
  document.getElementById('i-condition').value=iss.condition||'';
  document.getElementById('i-reassess-date').value=iss.reassessDate||'';
  document.getElementById('i-progress').value=iss.progress||'';
  document.getElementById('i-reassess-notes').value=iss.reassessNotes||'';
  remedyBlocks=(iss.remedies||[]).map(r=>({...r}));
  remedyBlocks.forEach(rb=>{blockDays[rb.id]=rb.daysOfWeek||[];});
  refreshRemedyBlocks();
  document.getElementById('issue-modal').classList.add('show');
}
// Open issue modal pre-filled to add a remedy to existing issue
function openAddRemedyToIssue(memberId,issueId){
  const m=members.find(x=>x.id===memberId);
  const iss=(m.issues||[]).find(x=>x.id===issueId);if(!iss)return;
  editIssueId=issueId;currentMemberId=memberId;
  document.getElementById('issue-modal-title').textContent='Edit health issue';
  populateMemberDropdown(memberId);
  document.getElementById('i-condition').value=iss.condition||'';
  document.getElementById('i-reassess-date').value=iss.reassessDate||'';
  document.getElementById('i-progress').value=iss.progress||'';
  document.getElementById('i-reassess-notes').value=iss.reassessNotes||'';
  remedyBlocks=(iss.remedies||[]).map(r=>({...r}));
  // Add a new blank remedy block
  const rb={id:uid(),name:'',dosage:'',freqHours:24,freqType:'interval',daysOfWeek:[],startTime:null,notes:'',dailyLog:{},doseLog:[]};
  remedyBlocks.push(rb);blockDays[rb.id]=[];
  remedyBlocks.forEach(rb2=>{if(!blockDays[rb2.id])blockDays[rb2.id]=rb2.daysOfWeek||[];});
  refreshRemedyBlocks();
  // Scroll modal to bottom so new remedy is visible
  setTimeout(()=>{const m=document.querySelector('#issue-modal .modal');if(m)m.scrollTop=m.scrollHeight;},100);
  document.getElementById('issue-modal').classList.add('show');
}
function saveIssue(){
  const condition=document.getElementById('i-condition').value.trim();if(!condition)return;
  const selMemberId=document.getElementById('i-member').value||currentMemberId;
  const m=members.find(x=>x.id===selMemberId);if(!m)return;
  if(!m.issues)m.issues=[];
  const reassessDate=document.getElementById('i-reassess-date').value||null;
  const progress=document.getElementById('i-progress').value.trim();
  const reassessNotes=document.getElementById('i-reassess-notes').value.trim();
  const remedies=collectRemedyBlocks();
  if(editIssueId){
    const iss=m.issues.find(x=>x.id===editIssueId);
    if(iss)Object.assign(iss,{condition,reassessDate,progress,reassessNotes,remedies,notesUpdated:new Date().toISOString()});
  } else {
    m.issues.push({id:uid(),condition,reassessDate,progress,reassessNotes,remedies,closed:false,notesUpdated:null});
  }
  save();render();closeModal('issue-modal');
}
function deleteIssue(memberId,issueId){
  const m=members.find(x=>x.id===memberId);if(!m)return;
  if(!confirm('Delete this health issue and all its remedies? This cannot be undone.'))return;
  m.issues=(m.issues||[]).filter(i=>i.id!==issueId);
  const key=`${memberId}__${issueId}`;delete expandedIssues[key];
  save();render();
}
function closeCase(memberId,issueId){
  const m=members.find(x=>x.id===memberId);
  const i=(m&&m.issues||[]).find(x=>x.id===issueId);
  if(i){i.closed=true;delete expandedIssues[`${memberId}__${issueId}`];}
  save();render();
}
function reopenCase(memberId,issueId){
  const m=members.find(x=>x.id===memberId);
  const i=(m&&m.issues||[]).find(x=>x.id===issueId);
  if(i)i.closed=false;save();render();
}
function deleteRemedy(memberId,issueId,remedyId){
  if(!confirm('Delete this remedy? This cannot be undone.'))return;
  const m=members.find(x=>x.id===memberId);
  const i=(m&&m.issues||[]).find(x=>x.id===issueId);
  if(i)i.remedies=(i.remedies||[]).filter(r=>r.id!==remedyId);save();render();
}

// ---- Notes ----
function openNotes(memberId,issueId){
  notesMemberId=memberId;notesIssueId=issueId;
  const m=members.find(x=>x.id===memberId);
  const iss=(m&&m.issues||[]).find(i=>i.id===issueId);if(!iss)return;
  document.getElementById('notes-modal-title').textContent=`Notes — ${iss.condition}`;
  document.getElementById('n-progress').value=iss.progress||'';
  document.getElementById('n-reassess').value=iss.reassessNotes||'';
  document.getElementById('notes-last-updated').textContent=iss.notesUpdated?new Date(iss.notesUpdated).toLocaleString():'Never';
  switchNotesTab('progress');
  document.getElementById('notes-modal').classList.add('show');
}
function switchNotesTab(tab){
  document.querySelectorAll('.tabs .tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='progress'?0:1)));
  document.getElementById('notes-tab-progress').style.display=tab==='progress'?'':'none';
  document.getElementById('notes-tab-reassess').style.display=tab==='reassess'?'':'none';
}
function saveNotes(){
  const m=members.find(x=>x.id===notesMemberId);
  const iss=(m&&m.issues||[]).find(i=>i.id===notesIssueId);if(!iss)return;
  iss.progress=document.getElementById('n-progress').value.trim();
  iss.reassessNotes=document.getElementById('n-reassess').value.trim();
  iss.notesUpdated=new Date().toISOString();
  save();render();closeModal('notes-modal');
}

function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.modal-backdrop').forEach(b=>b.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');}));

render();
setInterval(render,60000);
</script>
